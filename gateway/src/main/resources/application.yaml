server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      # AQUÍ ESTÁ EL CAMBIO: Usamos las nuevas llaves oficiales
      server:
        webmvc:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                
          routes:
            - id: ingestion-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/transactions/**
                
            - id: dashboard-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/dashboard/**
                
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**

# ----------------------------------------------------
# SWAGGER HUB: Menú desplegable centralizado
# ----------------------------------------------------
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: 1. Ingestion Service (Ventas)
        url: /api/transactions/v3/api-docs
      - name: 2. Dashboard Service (Métricas)
        url: /api/dashboard/v3/api-docs
      - name: 3. Auth Service (Seguridad)
        url: /auth/v3/api-docs